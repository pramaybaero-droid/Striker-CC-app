<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#c8a65a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Striker" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<title>Striker - Carrom Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Carrom board inspired palette */
  --ivory:      #f3e7cf;   /* playing surface */
  --ivory-2:    #e8d8b5;
  --frame:      #3b2417;   /* dark wooden frame */
  --frame-2:    #2a1810;
  --espresso:   #1a0f08;   /* deep background */
  --cream:      #fbf5e8;
  --ink:        #17100a;

  /* Players match coin colors */
  --coin-white: #f6ecd3;
  --coin-white-line: #b8a373;
  --coin-black: #1c1612;
  --coin-black-line:#5a4a3a;

  /* Accents */
  --queen:      #c9344c;   /* queen / crimson */
  --queen-2:    #8e1f30;
  --gold:       #c8a65a;
  --gold-2:     #a3823b;
  --leaf:       #6b8e3d;

  /* Neutrals */
  --line:       rgba(255,241,205,0.12);
  --line-strong:rgba(255,241,205,0.22);
  --muted:      #c6b89a;
  --muted-2:    #8b7e66;

  --shadow-lg:  0 30px 80px -20px rgba(0,0,0,0.6), 0 10px 24px -8px rgba(0,0,0,0.4);
  --shadow-md:  0 10px 28px -8px rgba(0,0,0,0.45);
  --shadow-sm:  0 2px 10px -2px rgba(0,0,0,0.35);

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 22px;
  --r-xl: 32px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background:
    radial-gradient(1200px 700px at 10% -10%, #2d1a0e 0%, transparent 60%),
    radial-gradient(900px 600px at 100% 0%, #3a1e12 0%, transparent 55%),
    radial-gradient(1000px 700px at 50% 120%, #2a150a 0%, transparent 60%),
    var(--espresso);
  color: var(--cream);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: 0;
}

/* Subtle wood grain overlay for the page */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    repeating-linear-gradient(90deg, rgba(255,220,160,0.012) 0 2px, transparent 2px 7px),
    repeating-linear-gradient(0deg,  rgba(0,0,0,0.05) 0 1px, transparent 1px 5px);
  mix-blend-mode: overlay;
}
#root { position: relative; z-index: 1; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select { font-family: inherit; color: inherit; }
input:focus, select:focus, button:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
  border-radius: 6px;
}

/* ----------------------------- Type helpers ---------------------------- */
.display { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: 0; line-height: 0.95; }
.mono    { font-family: 'JetBrains Mono', monospace; }
.eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
.caps    { letter-spacing: 0.12em; text-transform: uppercase; }

/* ----------------------------- Buttons --------------------------------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 18px; border-radius: 999px;
  font-weight: 700; font-size: 13px;
  letter-spacing: 0.08em; text-transform: uppercase;
  transition: transform .12s ease, background .15s ease, color .15s ease, box-shadow .15s ease, border-color .15s ease;
  border: 1px solid transparent; white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.primary {
  background: linear-gradient(180deg, var(--gold) 0%, var(--gold-2) 100%);
  color: #1a1108; box-shadow: 0 6px 16px -6px rgba(200,166,90,0.6), inset 0 1px 0 rgba(255,255,255,0.35);
}
.btn.primary:hover { filter: brightness(1.05); }
.btn.ghost {
  background: rgba(255,241,205,0.04); color: var(--cream);
  border-color: var(--line-strong);
}
.btn.ghost:hover { background: rgba(255,241,205,0.08); }
.btn.crimson {
  background: linear-gradient(180deg, #d94562 0%, var(--queen-2) 100%);
  color: #fff5f0; box-shadow: 0 6px 16px -6px rgba(201,52,76,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn.dark {
  background: linear-gradient(180deg, #2a1b10 0%, #150c05 100%);
  color: var(--cream); border-color: var(--line-strong);
}
.btn.sm { padding: 8px 12px; font-size: 11px; }
.btn.icon { padding: 10px; border-radius: 10px; letter-spacing: 0; }
.btn[disabled] { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ------------------------------ App shell ------------------------------ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(180deg, rgba(18,10,4,0.75), rgba(18,10,4,0.4));
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff4d8, #e8d297 55%, #b38a3c);
  box-shadow: inset 0 -2px 4px rgba(0,0,0,.25), 0 2px 6px rgba(0,0,0,.4);
  position: relative;
}
.brand-mark::after {
  content: ''; position: absolute; inset: 6px; border-radius: 50%;
  background: radial-gradient(circle at 40% 30%, #b83049, #6b1628);
  box-shadow: inset 0 -1px 2px rgba(0,0,0,.35);
}
.brand-name {
  font-family: 'Instrument Serif', serif;
  font-size: 26px; letter-spacing: 0;
}
.brand-name em { font-style: italic; color: var(--gold); }

.tab-row {
  display: flex; align-items: center; gap: 6px; overflow: auto;
  padding: 10px 28px; border-bottom: 1px solid var(--line);
  background: rgba(10,6,3,0.4);
}
.tab {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--line);
  background: rgba(255,241,205,0.03);
  color: var(--muted);
  white-space: nowrap;
}
.tab.active {
  color: var(--cream); border-color: var(--gold);
  background: linear-gradient(180deg, rgba(200,166,90,0.18), rgba(200,166,90,0.05));
}
.tab .close { opacity: 0.6; }
.tab .close:hover { opacity: 1; color: var(--queen); }

.shell { padding: 28px; max-width: 1400px; margin: 0 auto; }
@media (max-width: 720px) { .shell { padding: 16px; } .topbar { padding: 14px 16px; } .tab-row { padding: 8px 16px; } }

/* ------------------------------ Welcome -------------------------------- */
.welcome {
  min-height: calc(100vh - 72px);
  display: grid; place-items: center; padding: 40px 20px;
}
.welcome-card {
  width: min(880px, 100%);
  background: linear-gradient(180deg, #1e130a 0%, #150c05 100%);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-xl);
  padding: 56px 48px;
  box-shadow: var(--shadow-lg);
  position: relative; overflow: hidden;
}
.welcome-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(600px 300px at 50% -10%, rgba(200,166,90,0.14), transparent 60%);
  pointer-events: none;
}
.welcome h1 {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(44px, 7vw, 92px);
  line-height: 0.95; margin: 0 0 8px;
  font-weight: 400; letter-spacing: 0;
}
.welcome h1 em { color: var(--gold); font-style: italic; }
.welcome p.lede { color: var(--muted); font-size: 16px; max-width: 52ch; margin: 0 0 32px; }

.setup-controls {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin: 22px 0 8px;
}
.setup-block {
  background: rgba(255,241,205,0.035);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  padding: 14px;
}
.option-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}
.option-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(255,241,205,0.03);
}
.option-pill.active {
  color: #1a1108;
  border-color: var(--gold);
  background: linear-gradient(180deg, var(--gold), var(--gold-2));
}
@media (max-width: 780px) {
  .setup-controls { grid-template-columns: 1fr; }
}

.welcome .names {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: stretch;
  margin: 24px 0 28px;
}
@media (max-width: 640px) { .welcome .names { grid-template-columns: 1fr; } .welcome .versus { padding: 10px 0; } }

.name-field {
  position: relative;
  background: rgba(255,241,205,0.04);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  transition: border-color .15s ease;
}
.name-field:focus-within { border-color: var(--gold); }
.name-field .eyebrow { margin-bottom: 6px; }
.name-field input {
  width: 100%;
  background: transparent; border: none; padding: 0;
  font-family: 'Instrument Serif', serif;
  font-size: 32px; color: var(--cream);
  letter-spacing: 0;
}
.name-field input::placeholder { color: var(--muted-2); font-style: italic; }
.team-field input + input {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
}
.coin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff, #e9dcbb 55%, var(--coin-white-line));
  box-shadow: inset 0 -1px 2px rgba(0,0,0,.2);
}
.coin-dot.black { background: radial-gradient(circle at 35% 30%, #4a3d33, #1c1612 55%, #000); }

.versus {
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 36px; color: var(--gold);
}

/* ------------------------------- Toss ---------------------------------- */
.toss-stage {
  display: grid; grid-template-columns: 1fr; gap: 32px;
  place-items: center; text-align: center;
  padding: 24px 8px 8px;
}
.striker {
  position: relative;
  width: 180px; height: 180px; border-radius: 50%;
  background:
    radial-gradient(circle at 40% 35%, #fff9e6 0%, #e9d7a8 40%, #b58c44 90%);
  box-shadow:
    inset 0 -10px 20px rgba(0,0,0,0.25),
    inset 0 2px 4px rgba(255,255,255,0.5),
    0 30px 60px -20px rgba(0,0,0,0.7);
  display: grid; place-items: center;
  transition: transform .5s cubic-bezier(.2,.9,.3,1.2);
}
.striker.spin { animation: spin 1.2s cubic-bezier(.2,.7,.2,1) 1; }
@keyframes spin {
  0% { transform: rotate(0) scale(1); }
  50% { transform: rotate(540deg) scale(1.1); }
  100% { transform: rotate(1080deg) scale(1); }
}
.striker .ring { position: absolute; inset: 12px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); }
.striker .center { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: rgba(0,0,0,0.3); }

.toss-result {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1.05;
}
.toss-result em { font-style: italic; color: var(--gold); }

.toss-choice {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  width: min(560px, 100%); margin-top: 12px;
}
@media (max-width: 500px) { .toss-choice { grid-template-columns: 1fr; } }

.choice-card {
  background: rgba(255,241,205,0.03);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-lg);
  padding: 22px 20px; text-align: left;
  transition: border-color .15s ease, transform .15s ease, background .15s ease;
}
.choice-card:hover { border-color: var(--gold); transform: translateY(-2px); background: rgba(200,166,90,0.06); }
.choice-card .big {
  font-family: 'Instrument Serif', serif;
  font-size: 28px; color: var(--cream); line-height: 1.05;
}
.choice-card .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

/* ----------------------------- Scoreboard ------------------------------ */
.score-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 18px;
  align-items: stretch;
}
@media (max-width: 900px) { .score-grid { grid-template-columns: 1fr; } }

.player-card {
  position: relative;
  background: linear-gradient(180deg, #1e130a 0%, #140b04 100%);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-xl);
  padding: 24px;
  box-shadow: var(--shadow-md);
  overflow: hidden;
  transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
}
.player-card.leading {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px var(--gold), 0 30px 80px -20px rgba(200,166,90,0.3);
}
.player-card.leading::before {
  content: 'LEADING';
  position: absolute; top: 14px; right: 14px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
  padding: 4px 8px; border-radius: 999px;
  background: linear-gradient(180deg, var(--gold), var(--gold-2)); color: #1a1108;
}
.player-card.winner-match {
  border-color: var(--gold);
  background: linear-gradient(180deg, #2a1b0a 0%, #1a0f04 100%);
}

.player-head {
  display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
}
.avatar {
  width: 52px; height: 52px; border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'Instrument Serif', serif; font-size: 24px;
  flex-shrink: 0;
  border: 2px solid transparent;
}
.avatar.white {
  background: radial-gradient(circle at 35% 30%, #fff, #ede0bf 55%, var(--coin-white-line));
  color: #3a2e15;
  border-color: rgba(0,0,0,0.1);
}
.avatar.black {
  background: radial-gradient(circle at 35% 30%, #5a4a3a, #1c1612 55%, #000);
  color: #f3e7cf;
  border-color: rgba(255,241,205,0.12);
}
.player-name {
  font-family: 'Instrument Serif', serif;
  font-size: 30px; line-height: 1.0; letter-spacing: 0;
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.player-label {
  margin-bottom: 4px;
  color: var(--gold);
}
.member-list {
  color: var(--muted);
  font-size: 12px;
  margin-top: 3px;
  line-height: 1.35;
}
.player-meta { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px; border-radius: 999px;
  border: 1px solid var(--line-strong);
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
}
.chip.break { color: var(--gold); border-color: var(--gold); }

.score-rows { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.score-cell {
  background: rgba(255,241,205,0.03);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 12px 14px;
}
.score-cell .eyebrow { margin-bottom: 4px; }
.score-cell .num {
  font-family: 'Instrument Serif', serif;
  font-size: 64px; line-height: 0.95; letter-spacing: 0;
}
.score-cell .num.small { font-size: 40px; }

.setpips { display: flex; gap: 6px; margin-top: 14px; }
.pip {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--line-strong);
  background: transparent;
}
.pip.won { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 12px rgba(200,166,90,0.5); }

/* Center: live status */
.center-card {
  width: 260px;
  background: linear-gradient(180deg, #1a0f04 0%, #100801 100%);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-xl);
  padding: 24px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  box-shadow: var(--shadow-md);
}
@media (max-width: 900px) { .center-card { width: 100%; } }
.center-card .big-set {
  font-family: 'Instrument Serif', serif;
  font-size: 120px; line-height: 0.9; color: var(--cream);
  letter-spacing: 0;
}
.center-card .set-of { color: var(--muted); font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; }
.center-card .board-line {
  margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--line-strong); width: 100%;
  display: flex; justify-content: space-between; font-size: 12px; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
}
.center-card .timer {
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; color: var(--gold); letter-spacing: 0.06em;
}
.live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #e14a4a; margin-right: 8px;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.status-tag {
  display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px;
  background: rgba(225,74,74,0.14); color: #f1a9a9;
  font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
}
.status-tag.match-over {
  background: linear-gradient(180deg, var(--gold), var(--gold-2)); color: #1a1108;
}
.status-tag.setpoint {
  background: linear-gradient(180deg, #d94562, var(--queen-2)); color: #fff;
}

/* ----------------------------- Award panel ----------------------------- */
.award {
  margin-top: 20px;
  background: linear-gradient(180deg, #1e130a 0%, #140b04 100%);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-xl);
  padding: 22px 24px;
  box-shadow: var(--shadow-md);
}
.award h3 {
  margin: 0 0 16px;
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: 26px;
  letter-spacing: 0;
}
.award-row {
  display: grid;
  grid-template-columns: auto auto 1fr auto auto;
  gap: 16px; align-items: center;
}
@media (max-width: 900px) { .award-row { grid-template-columns: 1fr 1fr; } }

.coin-stepper { display: flex; align-items: center; gap: 10px; }
.coin-stepper button {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--line-strong); background: rgba(255,241,205,0.05);
  font-size: 18px; color: var(--cream);
}
.coin-stepper .val {
  font-family: 'Instrument Serif', serif; font-size: 42px; line-height: 1;
  min-width: 56px; text-align: center;
}
.queen-toggle {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 999px;
  border: 1px solid var(--line-strong);
  background: rgba(255,241,205,0.03);
  font-weight: 600; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted);
  transition: all .15s ease;
}
.queen-toggle.on {
  border-color: var(--queen); color: #fff;
  background: linear-gradient(180deg, rgba(217,69,98,0.2), rgba(142,31,48,0.2));
}
.queen-toggle .queen-coin {
  width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ed6a80, var(--queen) 55%, var(--queen-2));
  box-shadow: inset 0 -1px 2px rgba(0,0,0,.3);
}

.award-actions { display: flex; gap: 10px; grid-column: 4 / -1; justify-self: end; }
@media (max-width: 900px) { .award-actions { grid-column: 1 / -1; justify-self: stretch; } }
.award-actions button { flex: 1; }

.award-hint { color: var(--muted); font-size: 12px; margin-top: 12px; grid-column: 1 / -1; }

/* ------------------------------ History -------------------------------- */
.panel {
  margin-top: 20px;
  background: linear-gradient(180deg, #1e130a 0%, #140b04 100%);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-xl);
  padding: 22px 24px;
  box-shadow: var(--shadow-md);
}
.panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
.panel-head h3 {
  margin: 0;
  font-family: 'Instrument Serif', serif;
  font-weight: 400; font-size: 26px;
  letter-spacing: 0;
}
.panel-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.history-table {
  width: 100%;
  border-collapse: separate; border-spacing: 0;
  font-size: 13px;
}
.history-table th {
  text-align: left; padding: 10px 12px;
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted-2); font-weight: 700;
  border-bottom: 1px solid var(--line-strong);
}
.history-table td {
  padding: 12px; border-bottom: 1px solid var(--line);
}
.history-table tr:last-child td { border-bottom: none; }
.history-table .set-row { background: rgba(200,166,90,0.06); }
.history-table .set-row td { font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; color: var(--gold); }
.history-table .score-cell-inline { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.winner-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px; border-radius: 999px;
  background: rgba(200,166,90,0.14); color: var(--gold);
  font-size: 11px; font-weight: 700;
}
.queen-badge {
  display: inline-block; padding: 2px 7px; border-radius: 6px;
  background: rgba(217,69,98,0.18); color: #ea92a2;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
}
.queen-badge.ignored {
  background: rgba(255,241,205,0.08);
  color: var(--muted);
}
.empty {
  text-align: center; padding: 36px 20px; color: var(--muted);
  font-style: italic; font-family: 'Instrument Serif', serif; font-size: 18px;
}

/* ------------------------------ Modal ---------------------------------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  display: grid; place-items: center; z-index: 100;
  backdrop-filter: blur(6px);
  animation: fade .2s ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal {
  width: min(560px, 92vw);
  background: linear-gradient(180deg, #221509 0%, #140b04 100%);
  border: 1px solid var(--gold);
  border-radius: var(--r-xl); padding: 40px 36px;
  text-align: center; box-shadow: var(--shadow-lg);
  position: relative;
}
.modal h2 {
  font-family: 'Instrument Serif', serif; font-weight: 400;
  font-size: 64px; line-height: 0.95; margin: 6px 0;
  letter-spacing: 0;
}
.modal h2 em { color: var(--gold); font-style: italic; }
.modal .stinger {
  font-size: 12px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 4px;
}
.modal .stinger.crimson { color: #ea92a2; }
.modal .modal-score {
  font-family: 'JetBrains Mono', monospace; font-size: 20px; color: var(--muted); margin: 16px 0 24px;
}
.modal-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

.modal.help-modal {
  width: min(760px, 94vw);
  max-height: 88vh;
  overflow: auto;
  text-align: left;
  padding: 34px;
}
.modal.help-modal h2 {
  font-size: clamp(38px, 6vw, 58px);
  text-align: left;
}
.help-intro {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.55;
  margin: 12px 0 18px;
}
.help-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.help-step {
  position: relative;
  background: rgba(255,241,205,0.04);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  padding: 16px 16px 15px 48px;
}
.help-num {
  position: absolute;
  left: 15px;
  top: 16px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: linear-gradient(180deg, var(--gold), var(--gold-2));
  color: #1a1108;
  font-size: 12px;
  font-weight: 800;
}
.help-step h3 {
  margin: 0 0 5px;
  font-size: 15px;
  color: var(--cream);
}
.help-step p,
.help-note {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}
.help-note {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: var(--r-md);
  border: 1px solid rgba(200,166,90,0.25);
  background: rgba(200,166,90,0.08);
}
@media (max-width: 640px) {
  .modal.help-modal { padding: 26px 20px; }
  .help-grid { grid-template-columns: 1fr; }
}

/* ----------------------------- Confetti -------------------------------- */
.confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
.confetti i {
  position: absolute; top: -20px;
  width: 10px; height: 16px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0.7; }
}

/* ------------------------------ Utility -------------------------------- */
.row { display: flex; align-items: center; gap: 10px; }
.spacer { flex: 1; }
.hide-sm { display: initial; }
@media (max-width: 640px) { .hide-sm { display: none; } }

.tip {
  font-size: 12px; color: var(--muted); font-style: italic;
}

.banner {
  margin-top: 16px; padding: 14px 18px; border-radius: var(--r-md);
  background: rgba(200,166,90,0.08); border: 1px solid rgba(200,166,90,0.25);
  color: var(--cream); font-size: 13px;
  display: flex; align-items: center; gap: 12px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,241,205,0.1); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,241,205,0.2); }

/* Name combobox dropdown */
.name-combo { position: relative; width: 100%; }
.name-combo input {
  width: 100%;
  background: transparent; border: none; padding: 0;
  color: var(--cream); font-family: 'Inter', sans-serif;
  font-size: clamp(28px, 3vw, 40px); font-weight: 600;
  letter-spacing: 0;
}
.name-combo input::placeholder { color: var(--muted-2); font-style: italic; }
.name-combo-dropdown {
  position: absolute;
  top: calc(100% + 10px);
  left: -18px; right: -18px;
  z-index: 50;
  background: #1c1814;
  border: 1px solid rgba(200, 166, 90, 0.35);
  border-radius: 10px;
  max-height: 260px;
  overflow-y: auto;
  padding: 6px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.55);
}
.name-combo-item {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  color: var(--cream);
  padding: 9px 12px;
  cursor: pointer;
  border-radius: 6px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0;
}
.name-combo-item:hover,
.name-combo-item.hi {
  background: rgba(200, 166, 90, 0.18);
  color: var(--gold-light, #f3e7cf);
}
.team-field .name-combo + .name-combo { margin-top: 14px; }

/* Tiebreak panel */
.tiebreak-panel .panel-head h3 { color: var(--gold); }
.tiebreak-panel .btn.primary { box-shadow: 0 0 0 1px rgba(200,166,90,0.45) inset; }


/* Roster manager modal */
.roster-modal { max-width: 560px; }
.roster-add {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  align-items: stretch;
}
.roster-add input {
  flex: 1; min-width: 0;
  background: rgba(255,241,205,0.04);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
}
.roster-add input:focus { outline: none; border-color: var(--gold); }
.roster-list {
  margin-top: 14px;
  max-height: 360px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.roster-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: rgba(255,241,205,0.04);
  border-radius: 10px;
  border: 1px solid var(--line-strong);
}
.roster-name { font-weight: 600; color: var(--cream); }

      </div>

"use strict";

/* src/util.jsx */
const LIMIT_POINTS = 25;
const LIMIT_BOARDS = 8;
const QUEEN_CUTOFF = 22;
const MAX_SETS = 3;
const STORAGE_KEY = "striker.matches.v1";
const ACTIVE_KEY = "striker.active.v1";
const SCORE_FORMATS = {
  standard: {
    label: "25 points / 8 boards",
    limitPoints: 25,
    limitBoards: 8,
    queenCutoff: 22
  },
  quick: {
    label: "15 points / 4 boards",
    limitPoints: 15,
    limitBoards: 4,
    queenCutoff: 11
  }
};
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function initials(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return "?";
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function fmtTime(ms) {
  if (!ms || ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor(s % 3600 / 60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2, "0");
  return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}
function fmtDate(ts) {
  if (!ts) return "";

  return d.toLocaleString(undefined, {
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}
function cleanName(name, fallback) {
  const n = String(name || "").trim();
  return n || fallback;
}
function clampInt(value, min, max, fallback) {
  const n = Math.floor(Number(value));
  if (!Number.isFinite(n)) return fallback;
  return Math.max(min, Math.min(max, n));
}
function safeTotalSets(value) {
  return clampInt(value, 1, 9, 3);
}
function setsNeeded(matchOrSets) {
  const total = typeof matchOrSets === "number" ? safeTotalSets(matchOrSets) : safeTotalSets(matchOrSets?.totalSets);
  return Math.floor(total / 2) + 1;
}
function scoreRules(format) {
  return SCORE_FORMATS[format] || SCORE_FORMATS.standard;
}
function matchLimitPoints(match) {
  return Number(match?.limitPoints) || scoreRules(match?.scoreFormat).limitPoints;
}
function matchLimitBoards(match) {
  if (match?.tiebreak?.boards && match?.tiebreak?.setNumber === match?.setNo) {
    return Number(match.tiebreak.boards);

function defaultMatch({

  const isDoubles = matchType === "doubles";

  const rules = scoreRules(normalizedScoreFormat);
  const setCount = safeTotalSets(totalSets);
  const p1Members = isDoubles ? [cleanName(teamA1, "Team A Player 1"), cleanName(teamA2, "Team A Player 2")] : [cleanName(name1, "Player One")];

function rosterKey(communityId) {
  return ROSTER_STORAGE_PREFIX + (communityId || "global");

function saveRoster(communityId, names) {
  const seen = new Set();
  const clean = [];
  for (const raw of Array.isArray(names) ? names : []) {
    const v = String(raw || "").trim();
    if (!v) continue;
    const k = v.toLowerCase();
    if (seen.has(k)) continue;
    seen.add(k);
    clean.push(v);
    if (clean.length >= 200) break;
  }
  try { localStorage.setItem(rosterKey(communityId), JSON.stringify(clean)); } catch {}
  return clean;
}

function getRoster(communityId, communitySlug) {
  try {
    const raw = localStorage.getItem(rosterKey(communityId));
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) return arr;
    }
  } catch {}
  if (communitySlug === DEFAULT_COMMUNITY_SLUG) {
    return saveRoster(communityId, DEFAULT_IISC_ROSTER);
  }
  return [];
}
