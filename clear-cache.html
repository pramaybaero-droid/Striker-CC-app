<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Striker - Clear Cache</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #1a0f08;
    color: #fbf5e8;
    font: 16px/1.5 system-ui, -apple-system, sans-serif;
    padding: 24px;
  }
  .card {
    width: min(620px, 100%);
    border: 1px solid rgba(255,241,205,.22);
    border-radius: 18px;
    background: #1e130a;
    padding: 28px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.6);
  }
  h1 { margin: 0 0 8px; font: italic 42px/1 Georgia, serif; color: #c8a65a; }
  p { color: #c6b89a; }
  .status { margin-top: 16px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; color: #fbf5e8; white-space: pre-wrap; }
  a, button { color: #1a1108; background: #c8a65a; border: 0; border-radius: 999px; padding: 10px 16px; font-weight: 700; text-decoration: none; cursor: pointer; display: inline-flex; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>Clearing Striker cache</h1>
  <p>This removes the old service worker and cached files that can keep serving a blank build after redeploy.</p>
  <div id="status" class="status">Working...</div>
  <a id="home" href="index.html" style="display:none;">Open app</a>
</div>
<script>
(async function () {
  const lines = [];
  const log = (msg) => {
    lines.push(msg);
    document.getElementById("status").textContent = lines.join("\n");
  };

  try {
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      log("Service workers found: " + regs.length);
      for (const reg of regs) {
        await reg.unregister();
        log("Unregistered: " + (reg.scope || "scope"));
      }
    } else {
      log("Service workers are not supported in this browser.");
    }

    if (window.caches) {
      const keys = await caches.keys();
      const strikerKeys = keys.filter(k => k.startsWith("striker"));
      log("Striker caches found: " + strikerKeys.length);
      for (const key of strikerKeys) {
        await caches.delete(key);
        log("Deleted cache: " + key);
      }
    }

    log("Done. Opening the app...");
    document.getElementById("home").style.display = "inline-flex";
    setTimeout(() => { location.href = "index.html?v=" + Date.now(); }, 1000);
  } catch (e) {
    log("Failed: " + (e && e.message ? e.message : e));
    document.getElementById("home").style.display = "inline-flex";
  }
})();
</script>
</body>
</html>
